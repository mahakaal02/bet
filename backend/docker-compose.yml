services:
  postgres:
    image: postgres:16-alpine
    container_name: uniquebid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uniquebid
      POSTGRES_PASSWORD: uniquebid
      POSTGRES_DB: uniquebid
    ports:
      - "5432:5432"
    volumes:
      - uniquebid-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniquebid"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uniquebid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - uniquebid-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uniquebid-pg:
  uniquebid-redis:
