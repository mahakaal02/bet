# Kalki reverse proxy — single entrypoint for the dev stack.
#
# Routes localhost:${PROXY_HTTP_PORT} (default 8000) to:
#
#   /                 → bet            (prediction-market app, :3100)
#   /api/             → backend        (NestJS, :4000)
#   /uploads/         → backend        (file uploads)
#   /socket.io/       → backend        (Socket.IO, including /aviator/socket.io)
#   /ws/              → backend        (raw WebSocket gateways)
#   /admin/           → admin          (Vite SPA, :5173 — same-origin friendly)
#
# auctions (:3200) and aviator (:3000) are NOT path-routed through this
# proxy because their Next.js i18n middleware rewrites every request to
# `/{locale}/...` — once the locale prefix is added, the URL no longer
# carries the app's path prefix and the proxy would fall through to bet
# on the next request. In prod each app gets its own subdomain
# (kalki-auctions.cloud.podstack.ai, kalki-aviator.cloud.podstack.ai)
# which avoids the collision; locally each app is reachable on its own
# host-mapped port instead (:3200, :3000). Bet is the only Next.js app
# served from `/` here because it's the user-facing entrypoint that
# matches prod's `kalki-bet.cloud.podstack.ai`.
#
# Each upstream uses the docker compose service name — DNS resolves
# inside the kalki-net bridge network.

upstream backend_upstream {
    server backend:4000;
}
upstream bet_upstream {
    server bet:3100;
}
upstream admin_upstream {
    server admin:5173;
}

# Map for WebSocket upgrades — required so the Connection header is
# only set to "upgrade" when the request is actually upgrading.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    # Generous client_max_body_size — admin uploads (auction banners)
    # can be a few MB; the prod ingress uses the same value.
    client_max_body_size 32m;

    # ── Backend API ────────────────────────────────────────────────
    location /api/ {
        # Strip the /api prefix so backend routes look the same as in
        # direct-port mode (http://localhost:4000/health).
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout                 300s;
    }

    location /uploads/ {
        proxy_pass http://backend_upstream/uploads/;
        proxy_set_header Host $host;
    }

    # ── WebSockets / Socket.IO ─────────────────────────────────────
    # The backend exposes three realtime endpoints (mount paths from
    # backend/src/bids/bid.gateway.ts and the Aviator + Notifications
    # gateways):
    #
    #   /ws                          — bidding engine (raw ws:// via Nest WsAdapter)
    #   /aviator/socket.io           — Aviator crash stream (Socket.IO)
    #   /notifications/socket.io     — notification broadcast (Socket.IO)
    #
    # All three need the same upgrade headers + long read timeout so a
    # client connection can stay open for the lifetime of the session.
    location /aviator/socket.io/ {
        proxy_pass http://backend_upstream/aviator/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout          3600s;
    }

    location /notifications/socket.io/ {
        proxy_pass http://backend_upstream/notifications/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout          3600s;
    }

    # /ws is the raw-WebSocket bidding-engine gateway (Nest WsAdapter,
    # backend/src/bids/bid.gateway.ts). `location = /ws` matches the
    # exact path — Nest's adapter doesn't accept subpaths. proxy_pass
    # has no URI part because an exact-match location forwards the
    # original $request_uri intact.
    location = /ws {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout          3600s;
    }

    # ── Admin SPA ──────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://admin_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Vite dev server uses websockets for HMR.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # ── Bet (default, catches everything else) ─────────────────────
    location / {
        proxy_pass http://bet_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
