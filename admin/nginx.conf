server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript;
  gzip_min_length 1024;

  location /api/ {
    proxy_pass http://kalki-backend:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }

  location /uploads/ {
    proxy_pass http://kalki-backend:4000/uploads/;
    proxy_set_header Host $host;
  }

  # Content-hashed build assets (Vite emits immutable filenames). Cache
  # them hard, and return a real 404 for a missing chunk instead of
  # falling through to the SPA shell: otherwise a stale index.html asks
  # for a chunk a later deploy deleted, nginx serves index.html
  # (text/html) in its place, and the browser rejects HTML-as-JS with
  # "Unexpected token '<'" -> blank page after every deploy.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Never let the SPA shell go stale. With no cache directive the browser
  # heuristically kept index.html across deploys, and that old shell
  # pointed at chunks the new build no longer ships (see /assets/ above).
  # no-cache forces a conditional revalidation on every load -- a cheap
  # 304 when unchanged -- so returning admins always boot the live build.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
