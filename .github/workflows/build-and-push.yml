name: Build & push container images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "bet/**"
      - "auctions/**"
      - "aviator/**"
      - "admin/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated subset to build (blank on push = auto-detect from changed paths; blank on manual = all five)"
        required: false
        default: ""

concurrency:
  group: build-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight prod build

jobs:
  # Detect which service trees changed in this push. Outputs one boolean per
  # service so the matrix can gate itself without rebuilding everything when
  # only a single app touched.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      bet: ${{ steps.filter.outputs.bet }}
      auctions: ${{ steps.filter.outputs.auctions }}
      aviator: ${{ steps.filter.outputs.aviator }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            bet:
              - 'bet/**'
            auctions:
              - 'auctions/**'
            aviator:
              - 'aviator/**'
            admin:
              - 'admin/**'

  build:
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Backend is server-side only — no NEXT_PUBLIC_* / VITE_* to inline.
          # Path-filtered builds catch every controller / engine / migration
          # change, which previously sat on main but never reached the pod
          # (the running image was whatever was pushed from the laptop
          # build-and-push.sh on day one).
          - service: backend
            changed: ${{ needs.detect.outputs.backend }}
            build_args: ""
          - service: bet
            changed: ${{ needs.detect.outputs.bet }}
            build_args: |
              NEXT_PUBLIC_AUCTIONS_URL=https://kalki-auctions.cloud.podstack.ai
              NEXT_PUBLIC_AVIATOR_URL=https://kalki-aviator.cloud.podstack.ai
              NEXT_PUBLIC_BACKEND_URL=https://kalki-backend.cloud.podstack.ai
              NEXT_PUBLIC_GOOGLE_ENABLED=false
          - service: auctions
            changed: ${{ needs.detect.outputs.auctions }}
            build_args: |
              NEXT_PUBLIC_AUCTIONS_URL=https://kalki-auctions.cloud.podstack.ai
              NEXT_PUBLIC_AVIATOR_URL=https://kalki-aviator.cloud.podstack.ai
              NEXT_PUBLIC_BACKEND_URL=https://kalki-backend.cloud.podstack.ai
              NEXT_PUBLIC_EXCHANGE_URL=https://kalki-bet.cloud.podstack.ai
              NEXT_PUBLIC_ADMIN_URL=https://kalki-admin.cloud.podstack.ai
              # Shared parent domain for the kalki_locale country cookie so
              # the hub country pick reaches the bet wallet subdomain.
              # Mirrors the backend's ADMIN_COOKIE_DOMAIN.
              NEXT_PUBLIC_COOKIE_DOMAIN=.cloud.podstack.ai
              # PR-TELEGRAM-GO-LIVE — Telegram bot public username.
              # Reads from a REPO VARIABLE (not a secret) since the
              # value ships in client chunks at build time and isn't
              # sensitive. `vars` returns the empty string when
              # undefined; secrets used to do the same but GH Actions
              # validation now rejects workflows whose secret refs
              # resolve to nothing — that's what broke every image
              # build between PR #107 and the fix in PR #112 (rolled
              # into this PR).
              #
              # The value is set via:
              #   gh variable set NEXT_PUBLIC_TELEGRAM_BOT \
              #     --body 'kalkibet_bot' --repo mahakaal02/bet
              NEXT_PUBLIC_TELEGRAM_BOT=${{ vars.NEXT_PUBLIC_TELEGRAM_BOT }}
          - service: aviator
            changed: ${{ needs.detect.outputs.aviator }}
            build_args: |
              NEXT_PUBLIC_API_URL=https://kalki-backend.cloud.podstack.ai
              NEXT_PUBLIC_AUCTIONS_URL=https://kalki-auctions.cloud.podstack.ai
              NEXT_PUBLIC_EXCHANGE_URL=https://kalki-bet.cloud.podstack.ai
              # Stage selector. `1` ships the astronaut-on-rocket art;
              # empty falls back to the legacy plane canvas. Currently ON.
              NEXT_PUBLIC_AVIATOR_ROCKET=1
          - service: admin
            changed: ${{ needs.detect.outputs.admin }}
            build_args: |
              VITE_API_BASE_URL=https://kalki-backend.cloud.podstack.ai
              VITE_BET_BASE_URL=https://kalki-bet.cloud.podstack.ai

    steps:
      # Resolve "should this matrix leg run?" per event + input:
      #   - workflow_dispatch with explicit services input → respect the list
      #   - workflow_dispatch with blank input → run all four
      #   - push → only run if the service's tree changed (from detect job)
      - name: Gate
        id: gate
        run: |
          input="${{ github.event.inputs.services }}"
          event="${{ github.event_name }}"
          changed="${{ matrix.changed }}"
          svc="${{ matrix.service }}"

          if [ "$event" = "workflow_dispatch" ]; then
            if [ -n "$input" ]; then
              if [[ ",${input}," == *",${svc},"* ]]; then
                echo "selected=true"  >> "$GITHUB_OUTPUT"
              else
                echo "selected=false" >> "$GITHUB_OUTPUT"
                echo "::notice::skipping ${svc} (not in dispatch input: ${input})"
              fi
            else
              # blank input on manual run = build all four
              echo "selected=true" >> "$GITHUB_OUTPUT"
            fi
          else
            # push event — only build if files in this service tree changed
            if [ "$changed" = "true" ]; then
              echo "selected=true" >> "$GITHUB_OUTPUT"
            else
              echo "selected=false" >> "$GITHUB_OUTPUT"
              echo "::notice::skipping ${svc} (no path changes)"
            fi
          fi

      - name: Checkout
        if: steps.gate.outputs.selected == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.gate.outputs.selected == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.gate.outputs.selected == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.gate.outputs.selected == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag: UTC YYYYMMDDTHHMMSSZ + 7-char SHA. Both pieces are useful — the
      # timestamp sorts lexicographically, the SHA traces back to source.
      - name: Compute tag
        if: steps.gate.outputs.selected == 'true'
        id: tag
        run: echo "value=$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push ${{ matrix.service }}
        if: steps.gate.outputs.selected == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/kalki-${{ matrix.service }}:latest
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/kalki-${{ matrix.service }}:${{ steps.tag.outputs.value }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
