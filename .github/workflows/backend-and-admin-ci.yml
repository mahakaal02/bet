# Lightweight CI for the rest of the monorepo. The Android `app/` tree is
# heavier (Gradle, SDK, emulator) and intentionally skipped — that runs
# locally / on Android Studio.
name: Backend + Admin CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "admin/**"
      - ".github/workflows/backend-and-admin-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "admin/**"
      - ".github/workflows/backend-and-admin-ci.yml"

concurrency:
  group: be-admin-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    if: contains(github.event.head_commit.modified, 'backend/') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test --if-present -- --passWithNoTests

  admin:
    if: contains(github.event.head_commit.modified, 'admin/') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
