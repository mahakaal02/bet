# ─── global ────────────────────────────────────────────────────────────────
global:
  domain: cloud.podstack.ai
  hostnamePrefix: kalki- # → kalki-backend.cloud.podstack.ai, etc.
  imageRegistry: docker.io/saurav7055
  # Per-service `imageTag` (below) overrides this when set. Flux's
  # ImageUpdateAutomation only writes to the per-service field, so this
  # value is the fallback for any service that doesn't have one yet.
  imageTag: latest
  imagePullPolicy: IfNotPresent
# Anti-affinity is applied to every kalki workload (see _helpers.tpl
# `kalki.nodeAffinity` → `kubernetes.io/hostname NotIn …`).
# - podstackl40s: L40s GPU node, reserved for AI workloads.
# - podstack-huawei-cp-01: the kalki-backend uploads PVC is a
#   ReadWriteOnce Longhorn volume attached on cp-02. Pinning the
#   workload off cp-01 prevents the deployment controller from
#   scheduling a surge pod on cp-01 mid-rollout, where it would
#   deadlock on `Multi-Attach error` waiting for cp-02 to detach.
excludeNodes:
  - podstackl40s
  - podstack-huawei-cp-01
traefik:
  entryPoint: websecure
  certResolver: letsencrypt # matches existing kalkai chart
# Cross-service shared secret. JWT_SECRET / BACKEND_JWT_SECRET must match
# between backend and bet. INTERNAL_API_SECRET likewise. Override these
# before going live.
sharedSecret:
  jwtSecret: "CHANGE_ME_jwt_secret_kalki_default"
  internalApiSecret: "CHANGE_ME_internal_api_secret_kalki_default"
  nextauthSecret: "CHANGE_ME_nextauth_secret_kalki_default"
  razorpayKeyId: ""
  razorpayKeySecret: ""
  razorpayWebhookSecret: ""
  # PR-BET-NOWPAYMENTS-SECRETS — crypto top-up integration. The
  # bet/lib/nowpayments.ts client reads these from env (mounted via
  # `envFrom: kalki-shared` on the bet pod). Until both are set,
  # `isFullyConfigured()` returns false and the integration silently
  # disables itself — the wallet UI falls back to the "Ask an Admin
  # on Secure Kalki Chat" CTA, no breakage.
  #
  # Override in the `kalki-helm-values` in-cluster Secret rather
  # than committing real values to this file. Pattern matches the
  # postgres password runbook above. To rotate:
  #
  #   kubectl -n kalki get secret kalki-helm-values \
  #     -o jsonpath='{.data.values\.yaml}' | base64 -d > /tmp/v.yaml
  #   # edit /tmp/v.yaml under sharedSecret: to add the two keys
  #   kubectl -n kalki create secret generic kalki-helm-values \
  #     --from-file=values.yaml=/tmp/v.yaml \
  #     --dry-run=client -o yaml | kubectl -n kalki apply -f -
  #   # Flux reconciles within ~1 min; restart bet to pick up secrets
  #   kubectl -n kalki rollout restart deploy/kalki-bet
  nowpaymentsApiKey: ""
  nowpaymentsIpnSecret: ""
postgres:
  enabled: true
  image: postgres:16-alpine
  user: postgres
  # ⚠️  KNOWN ISSUE — the production cluster was initialised with this
  # literal value as the actual postgres password (the StatefulSet
  # PV stores the password hash on first boot; subsequent env-var
  # changes are ignored). Until that password is rotated in-cluster
  # via `ALTER USER postgres WITH PASSWORD …` + a coordinated update
  # of the `kalki-helm-values` Secret, this file must keep matching
  # the live credential or every client app loses DB access.
  #
  # Rotation runbook (do once, off-hours):
  #   1. Generate a strong password:
  #        NEW_PW=$(openssl rand -hex 32)
  #   2. Apply inside the running PG:
  #        kubectl -n kalki exec -it kalki-postgres-0 -- \
  #          psql -U postgres -c "ALTER USER postgres WITH PASSWORD '$NEW_PW';"
  #   3. Add `postgres.password: "<new>"` to the `kalki-helm-values`
  #      Secret in cluster (the values-from-Secret overrides this
  #      file's value):
  #        kubectl -n kalki get secret kalki-helm-values -o jsonpath='{.data.values\.yaml}' | base64 -d > /tmp/v.yaml
  #        # add `postgres: { password: "<new>" }` to /tmp/v.yaml
  #        kubectl -n kalki create secret generic kalki-helm-values \
  #          --from-file=values.yaml=/tmp/v.yaml --dry-run=client -o yaml \
  #          | kubectl -n kalki apply -f -
  #   4. Bounce backend + bet pods so their DATABASE_URL pulls the new
  #      password on next start.
  #   5. Replace this default with another `CHANGE_ME_*` sentinel and
  #      land a follow-up PR adding a fail-fast guard in postgres.yaml
  #      so the default can never silently ship again.
  password: "kalki-postgres-default"
  storage:
    size: 20Gi
    storageClassName: longhorn
  databases:
    - uniquebid
    - bet
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 2Gi
# External Redis from kalkai namespace. Pass the password via --set at
# install time (see the README at the chart root for the one-liner).
redis:
  host: kalkai-redis-master.kalkai.svc.cluster.local
  port: 6379
  keyPrefix: "kalki:"
  password: ""
# ─── per-service ───────────────────────────────────────────────────────────
backend:
  image: kalki-backend
  imageTag: 20260522T184305Z-19425f8 # {"$imagepolicy": "flux-system:kalki-backend:tag"}
  port: 4000
  replicas: 1
  prismaMigrate: true # init-container runs `prisma migrate deploy`
  # init-container runs `prisma db seed` (idempotent — every row is an
  # upsert). Lets us ship new auctions / coin packs / demo users by
  # editing `backend/prisma/seed.ts` without a manual kubectl exec
  # step. Turn off if you intend to manage seed data exclusively from
  # outside the repo (e.g. via the admin surface).
  prismaSeed: true
  databaseUrl: "" # if blank, built from postgres values
  env: {}
  # PR-ADMIN-COOKIE-AUTH follow-up: when the admin SPA uses HttpOnly
  # cookies for auth (it does, post-PR-71), the backend must respond
  # to credentialed CORS preflights with a SPECIFIC origin — browsers
  # forbid `Access-Control-Allow-Origin: *` together with `credentials:
  # include`. The backend code reads CORS_ALLOWED_ORIGINS
  # (comma-separated) and switches to the credentialed CORS config
  # when set; empty/unset falls back to the wildcard for
  # backwards-compat with mobile + bearer-only clients.
  #
  # Baked into the chart defaults (was previously an empty string,
  # expecting the cluster overlay Secret to set it). Moved here so
  # the prod kalki cluster gets the value via plain Flux git-sync —
  # the in-cluster `kalki-helm-values` Secret doesn't need a manual
  # kubectl edit to flip CORS modes. Non-prod clusters running the
  # same chart inherit this origin too, which is harmless (browsers
  # only honour it when the SPA actually runs at that hostname) and
  # keeps the chart self-contained.
  #
  # All four SPA origins included by default. The admin SPA is the
  # one that NEEDS credentialed CORS (httpOnly cookie auth), but the
  # other three game frontends also fetch the backend from the
  # browser (Aviator's `/wallet/balance`, Auctions' watchlist polls,
  # Bet's wallet refresh). With only `kalki-admin` in this list, the
  # browser rejected those cross-origin requests with
  # `Access-Control-Allow-Origin` errors → wallet appeared
  # disconnected in Aviator, watchlist refresh failed in Auctions,
  # etc.
  #
  # Order doesn't matter — the cors middleware does an O(n) match.
  # Extending: append `,https://<your-origin>` to the string below.
  corsAllowedOrigins: "https://kalki-admin.cloud.podstack.ai,https://kalki-aviator.cloud.podstack.ai,https://kalki-auctions.cloud.podstack.ai,https://kalki-bet.cloud.podstack.ai"
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  uploads:
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: longhorn
  # PR-WORKER-EXTRACT — dedicated worker pod (KALKI_ROLE=worker). Same
  # image, no HTTP listener; runs @Cron jobs (outbox drain,
  # notification dispatch, recon, fraud sweep, auction settle).
  #
  # Default `replicas: 1` because we haven't shipped leader election
  # yet — running >1 would fire every cron twice. Postgres row locks
  # (SKIP LOCKED on outbox + notification) prevent data corruption
  # but not double-side-effects (an outbox row marked DEAD twice is
  # harmless; an email queued twice is not). PR-LEADER-ELECT lifts
  # this restriction.
  #
  # Until enabled, the api pod's @Cron jobs continue to run inline
  # — fully backwards-compatible with the legacy single-pod topology.
  worker:
    enabled: false
    replicas: 1
    resources:
      requests: {cpu: 100m, memory: 256Mi}
      limits: {cpu: 500m, memory: 512Mi}
bet:
  image: kalki-bet
  imageTag: 20260525T180552Z-c63589d # {"$imagepolicy": "flux-system:kalki-bet:tag"}
  port: 3100
  replicas: 1
  prismaMigrate: true
  # init-container runs `prisma db seed`. The Bet seed upserts every
  # market by slug, every achievement by code, every demo user by
  # email — so re-running adds new markets without touching existing
  # trading volume / price points on already-seeded rows.
  prismaSeed: true
  databaseUrl: ""
  env: {}
  # PR-BET-NOWPAYMENTS — crypto top-ups via NOWPayments.
  #
  # Two secrets MUST live in the `kalki-shared` Secret for the
  # integration to fire (the bet pod loads them via `envFrom`):
  #
  #   NOWPAYMENTS_API_KEY     — server-side API key (Dashboard →
  #                              Settings → Payments API). Required.
  #   NOWPAYMENTS_IPN_SECRET  — HMAC-SHA512 callback verification
  #                              secret (Dashboard → Settings →
  #                              Payments API → IPN). REQUIRED — the
  #                              webhook handler refuses to credit
  #                              wallets when missing.
  #
  # The sandbox toggle below is plain config (not a secret) so ops
  # can cut between sandbox + prod from a values bump alone without
  # rotating the secrets.
  nowpayments:
    sandbox: "false"
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {cpu: 1000m, memory: 1Gi}
auctions:
  image: kalki-auctions
  imageTag: 20260520T162324Z-c1e4982 # {"$imagepolicy": "flux-system:kalki-auctions:tag"}
  port: 3200
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}
aviator:
  image: kalki-aviator
  imageTag: 20260524T192743Z-9a72318 # {"$imagepolicy": "flux-system:kalki-aviator:tag"}
  port: 3000
  replicas: 1
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {cpu: 500m, memory: 512Mi}
admin:
  image: kalki-admin
  imageTag: 20260522T093329Z-fcb4bfd # {"$imagepolicy": "flux-system:kalki-admin:tag"}
  port: 80
  replicas: 1
  resources:
    requests: {cpu: 25m, memory: 64Mi}
    limits: {cpu: 200m, memory: 256Mi}
# ─── ClamAV daemon (in-cluster virus scanner for KYC) ──────────────────
# Activated by setting backend env `KYC_VIRUS_SCANNER=clamav`. The
# backend reaches this via the `clamd` Service in the same namespace
# (matches `CLAMD_HOST` default in backend/src/kyc/virus-scanner.ts).
#
# Disabled by default so dev installs + CI fixtures keep using the
# StubVirusScanner. Flip `enabled: true` in your prod values overlay.
clamav:
  enabled: false
  # Pinned to a major.minor tag (1.3 line) rather than `latest` so
  # rollouts are predictable. Upstream image bundles freshclam +
  # clamd; we run both.
  image: clamav/clamav:1.3
  port: 3310
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: longhorn
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
# ─── KYC infra drivers (PR-INFRA-S3-1 / PR-INFRA-KMS-1 / PR-INFRA-CLAMAV-1)
# All three off by default so dev installs + CI keep using the disk +
# stub + local-key trio. Flip individually in your prod overlay. The
# clamav daemon itself is configured under the `clamav` block above —
# this section is for the KYC cipher only (S3 storage env-vars live
# in the kalki-shared Secret).
#
# AWS credentials (region + access key + secret) come from the
# kalki-shared Secret — set them once and they're picked up by S3,
# KMS, and SES alike. See aws/sigv4.ts for the shared signer.
kyc:
  cipher:
    # 'local' → AES-256-GCM with KYC_DOCUMENT_KEY (or JWT_SECRET in dev)
    # 'kms'   → KMS-wrapped DEK + AES-256-GCM envelope (recommended in prod)
    driver: local
    # KMS alias or ARN. Only consulted when driver=kms. The backend's
    # IAM principal needs `kms:GenerateDataKey` + `kms:Decrypt` on this key.
    kmsKeyId: alias/kalki/kyc
