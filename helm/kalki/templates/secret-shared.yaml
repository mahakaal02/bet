apiVersion: v1
kind: Secret
metadata:
  name: kalki-shared
  labels:
    {{- include "kalki.labels" (dict "name" "shared" "ctx" .) | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.sharedSecret.jwtSecret | quote }}
  BACKEND_JWT_SECRET: {{ .Values.sharedSecret.jwtSecret | quote }}
  INTERNAL_API_SECRET: {{ .Values.sharedSecret.internalApiSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.sharedSecret.nextauthSecret | quote }}
  RAZORPAY_KEY_ID: {{ .Values.sharedSecret.razorpayKeyId | quote }}
  RAZORPAY_KEY_SECRET: {{ .Values.sharedSecret.razorpayKeySecret | quote }}
  RAZORPAY_WEBHOOK_SECRET: {{ .Values.sharedSecret.razorpayWebhookSecret | quote }}
