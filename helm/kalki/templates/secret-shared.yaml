apiVersion: v1
kind: Secret
metadata:
  name: kalki-shared
  labels:
    {{- include "kalki.labels" (dict "name" "shared" "ctx" .) | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.sharedSecret.jwtSecret | quote }}
  BACKEND_JWT_SECRET: {{ .Values.sharedSecret.jwtSecret | quote }}
  INTERNAL_API_SECRET: {{ .Values.sharedSecret.internalApiSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.sharedSecret.nextauthSecret | quote }}
  RAZORPAY_KEY_ID: {{ .Values.sharedSecret.razorpayKeyId | quote }}
  RAZORPAY_KEY_SECRET: {{ .Values.sharedSecret.razorpayKeySecret | quote }}
  RAZORPAY_WEBHOOK_SECRET: {{ .Values.sharedSecret.razorpayWebhookSecret | quote }}
  # PR-BET-NOWPAYMENTS-SECRETS — NOWPayments crypto top-ups (consumed
  # by bet/lib/nowpayments.ts). Two required secrets:
  #
  #   NOWPAYMENTS_API_KEY     Server-side API key.
  #   NOWPAYMENTS_IPN_SECRET  HMAC-SHA512 callback secret. REQUIRED —
  #                            the webhook handler refuses to credit
  #                            wallets when this is missing.
  #
  # `default ""` so an unset value renders an empty string and the
  # integration silently disables itself — no secret-validation
  # failure at apply-time, no broken bet pod. Set the real values via
  # the in-cluster `kalki-helm-values` Secret (see the postgres
  # password rotation runbook in values.yaml for the same pattern).
  NOWPAYMENTS_API_KEY: {{ .Values.sharedSecret.nowpaymentsApiKey | default "" | quote }}
  NOWPAYMENTS_IPN_SECRET: {{ .Values.sharedSecret.nowpaymentsIpnSecret | default "" | quote }}
  # PR-TELEGRAM-LOGIN — bot token used server-side by
  # `auctions/lib/telegram.ts` (start route) and the Nest backend's
  # TelegramAuthService (HMAC verification on /auth/telegram).
  # Both services must read the SAME token; sharing through this
  # Secret guarantees that. Empty value disables the integration —
  # clicking the Telegram button returns a 503 with a clear message.
  TELEGRAM_BOT_TOKEN: {{ .Values.sharedSecret.telegramBotToken | default "" | quote }}
