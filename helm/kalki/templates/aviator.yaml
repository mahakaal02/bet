---
apiVersion: v1
kind: Service
metadata:
  name: kalki-aviator
  labels:
    {{- include "kalki.labels" (dict "name" "aviator" "ctx" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.aviator.port }}
      targetPort: {{ .Values.aviator.port }}
      name: http
  selector:
    app.kubernetes.io/name: aviator
    app.kubernetes.io/part-of: kalki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalki-aviator
  labels:
    {{- include "kalki.labels" (dict "name" "aviator" "ctx" .) | nindent 4 }}
spec:
  replicas: {{ .Values.aviator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aviator
      app.kubernetes.io/part-of: kalki
  template:
    metadata:
      labels:
        {{- include "kalki.labels" (dict "name" "aviator" "ctx" .) | nindent 8 }}
        app.kubernetes.io/name: aviator
    spec:
      {{- include "kalki.nodeAffinity" . | nindent 6 }}
      containers:
        - name: aviator
          image: {{ include "kalki.image" (dict "image" .Values.aviator.image "tag" .Values.aviator.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.aviator.port }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.aviator.port | quote }}
            {{- include "kalki.publicUrlEnv" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.aviator.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.aviator.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.aviator.resources | nindent 12 }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-aviator
  labels:
    {{- include "kalki.labels" (dict "name" "aviator" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ include "kalki.host" (dict "svc" "aviator" "ctx" .) }}`)
      services:
        - name: kalki-aviator
          port: {{ .Values.aviator.port }}
  tls:
    certResolver: {{ .Values.traefik.certResolver }}
