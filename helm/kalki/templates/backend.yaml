---
{{- if .Values.backend.uploads.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kalki-backend-uploads
  labels:
    {{- include "kalki.labels" (dict "name" "backend" "ctx" .) | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.backend.uploads.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.backend.uploads.persistence.size }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: kalki-backend
  labels:
    {{- include "kalki.labels" (dict "name" "backend" "ctx" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      name: http
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: kalki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalki-backend
  labels:
    {{- include "kalki.labels" (dict "name" "backend" "ctx" .) | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  # `Recreate` (not default `RollingUpdate`) because the uploads PVC
  # is ReadWriteOnce (Longhorn). A rolling update would schedule a
  # surge pod alongside the running one, where it hangs on
  # `Multi-Attach error` for the duration of Helm's 5m wait — three
  # consecutive timeouts then flip the HelmRelease to
  # `Stalled: RetriesExceeded` and image bumps stop rolling out.
  # `Recreate` kills the old pod first, releases the volume, then
  # starts the new one. Brief downtime per rollout is acceptable for
  # this single-replica workload until leader election lets us scale
  # the backend horizontally.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: kalki
  template:
    metadata:
      labels:
        {{- include "kalki.labels" (dict "name" "backend" "ctx" .) | nindent 8 }}
    spec:
      {{- include "kalki.nodeAffinity" . | nindent 6 }}
      # `fsGroup: 1001` matches the nodejs UID/GID baked into the
      # backend Dockerfile. Kubernetes recursively chowns mounted
      # volumes (including the longhorn-provisioned uploads PVC) to
      # this GID at mount time, so multer disk writes succeed instead
      # of failing with EACCES.
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      {{- if or .Values.backend.prismaMigrate .Values.backend.prismaSeed }}
      initContainers:
        {{- if .Values.backend.prismaMigrate }}
        - name: prisma-migrate
          image: {{ include "kalki.image" (dict "image" .Values.backend.image "tag" .Values.backend.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # Prisma migrate still needs root to handle init scenarios
          # (creating extensions, etc.) before the main container takes
          # over. Override the pod-level securityContext just for this
          # init step. `runAsUser: 0` is well-bounded — Prisma exits
          # immediately afterwards and the main container drops back to
          # the nodejs UID via the pod-level securityContext.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          # Pre-cleanup: any migration recorded as in-flight
          # (`finished_at IS NULL`) blocks every subsequent
          # `migrate deploy` until it's resolved. That happens whenever
          # a migration's SQL fails — Postgres rolls back the
          # transaction but Prisma's tracking row stays half-written.
          # The `db execute --stdin` snippet idempotently deletes such
          # rows so a corrected migration file gets a clean retry on
          # the next pod boot. `2>/dev/null || true` makes the whole
          # step a no-op when `_prisma_migrations` is healthy or when
          # the table doesn't exist yet (fresh DB). Then the regular
          # `migrate deploy || db push` runs as before.
          command:
            - sh
            - -c
            - |
              echo "DELETE FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL AND started_at < NOW() - INTERVAL '5 minutes';" \
                | npx prisma db execute --stdin --schema=prisma/schema.prisma 2>/dev/null || true
              npx prisma migrate deploy --schema=prisma/schema.prisma \
                || npx prisma db push --schema=prisma/schema.prisma --accept-data-loss
          env:
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "uniquebid" "override" .Values.backend.databaseUrl "ctx" .) | quote }}
        {{- end }}
        {{- if .Values.backend.prismaSeed }}
        # Idempotent seed — every entry in `backend/prisma/seed.ts` is
        # an `upsert` keyed by a stable id (auction.id / coinPack.id /
        # user.email), so re-running on every pod restart only inserts
        # missing rows and refreshes the descriptive fields of existing
        # ones. Lets us ship new auctions / coin packs without a manual
        # `kubectl exec ... prisma db seed` step.
        #
        # Failures here block the pod from starting, by design — a
        # silent seed error would mean operators don't see the new
        # rows in prod and have no signal to investigate. Logs surface
        # as the init-container's stdout/stderr (kubectl logs -c
        # prisma-seed).
        - name: prisma-seed
          image: {{ include "kalki.image" (dict "image" .Values.backend.image "tag" .Values.backend.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          # Invoke ts-node via Node's `-r ts-node/register` hook, NOT
          # `npx ts-node` — on Node 20 the ts-node CLI hands off into
          # ESM resolution and dies with
          # `ERR_UNKNOWN_FILE_EXTENSION: Unknown file extension ".ts"`.
          # The register hook keeps the process in CommonJS mode,
          # which matches `tsconfig.json` (`module: "commonjs"`).
          # `ts-node` itself still ships in `node_modules` (devDeps
          # are not pruned in the Dockerfile's runner stage).
          command: ["sh","-c","node -r ts-node/register prisma/seed.ts"]
          env:
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "uniquebid" "override" .Values.backend.databaseUrl "ctx" .) | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "kalki.image" (dict "image" .Values.backend.image "tag" .Values.backend.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "uniquebid" "override" .Values.backend.databaseUrl "ctx" .) | quote }}
            {{- include "kalki.redisEnv" . | nindent 12 }}
            {{- include "kalki.publicUrlEnv" . | nindent 12 }}
            # PR-ADMIN-COOKIE-AUTH follow-up — backend's `enableCors()`
            # switches to credentialed mode (specific origin + Allow-
            # Credentials: true) when this is set. Required for the
            # admin SPA's HttpOnly-cookie session to land in the
            # browser. Comma-separated list of origins. See
            # values.yaml `backend.corsAllowedOrigins` for full
            # rationale.
            #
            # `default` here guarantees the env var lands on the pod
            # even if an upstream values overlay (e.g. an in-cluster
            # `valuesFrom` Secret) explicitly sets the field to "".
            # Without this guard, an overlay zeroing the field would
            # silently fall back to wildcard CORS — and the admin
            # SPA cookie-auth flow would break again.
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.backend.corsAllowedOrigins | default "https://kalki-admin.cloud.podstack.ai" | quote }}
            {{- if .Values.clamav.enabled }}
            # Activate the ClamAV daemon scanner (PR-INFRA-CLAMAV-1).
            # Backend reaches `clamd` via the Service in this namespace;
            # see helm/kalki/templates/clamav.yaml.
            - name: KYC_VIRUS_SCANNER
              value: "clamav"
            - name: CLAMD_HOST
              value: "clamd"
            - name: CLAMD_PORT
              value: {{ .Values.clamav.port | quote }}
            {{- end }}
            {{- if eq (.Values.kyc.cipher.driver | default "local") "kms" }}
            # PR-INFRA-KMS-1 — envelope encryption against AWS KMS.
            # AWS_REGION + AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY
            # come from the kalki-shared Secret (envFrom below).
            - name: KYC_CIPHER_DRIVER
              value: "kms"
            - name: KYC_KMS_KEY_ID
              value: {{ .Values.kyc.cipher.kmsKeyId | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: kalki-shared
          volumeMounts:
            {{- if .Values.backend.uploads.persistence.enabled }}
            - name: uploads
              mountPath: /app/uploads
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        {{- if .Values.backend.uploads.persistence.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: kalki-backend-uploads
        {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-backend
  labels:
    {{- include "kalki.labels" (dict "name" "backend" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ include "kalki.host" (dict "svc" "backend" "ctx" .) }}`)
      services:
        - name: kalki-backend
          port: {{ .Values.backend.port }}
  tls:
    certResolver: {{ .Values.traefik.certResolver }}
