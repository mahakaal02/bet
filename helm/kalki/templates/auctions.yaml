---
apiVersion: v1
kind: Service
metadata:
  name: kalki-auctions
  labels:
    {{- include "kalki.labels" (dict "name" "auctions" "ctx" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.auctions.port }}
      targetPort: {{ .Values.auctions.port }}
      name: http
  selector:
    app.kubernetes.io/name: auctions
    app.kubernetes.io/part-of: kalki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalki-auctions
  labels:
    {{- include "kalki.labels" (dict "name" "auctions" "ctx" .) | nindent 4 }}
spec:
  replicas: {{ .Values.auctions.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: auctions
      app.kubernetes.io/part-of: kalki
  template:
    metadata:
      labels:
        {{- include "kalki.labels" (dict "name" "auctions" "ctx" .) | nindent 8 }}
    spec:
      {{- include "kalki.nodeAffinity" . | nindent 6 }}
      containers:
        - name: auctions
          image: {{ include "kalki.image" (dict "image" .Values.auctions.image "tag" .Values.auctions.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.auctions.port }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.auctions.port | quote }}
            {{- include "kalki.publicUrlEnv" . | nindent 12 }}
            # PR-TELEGRAM-GO-LIVE — canonical origin the auctions Next
            # app advertises to itself. The Telegram OAuth start route
            # (`/api/auth/telegram/start`) reads this to build the
            # `origin` + `return_to` parameters it passes to
            # `oauth.telegram.org/auth?…`. Telegram refuses the OAuth
            # redirect back to any host that isn't on the bot's
            # `/setdomain` allow-list, so `NEXTAUTH_URL` MUST match
            # the BotFather domain exactly (kalki.bet — set via the
            # bot owner's BotFather `/setdomain` step).
            #
            # Without this env, the start route falls back to the
            # request's `Host` header, which behind a Traefik
            # IngressRoute is the routed external host most of the
            # time but can desync (e.g. internal probes, custom
            # forwarding). Pinning it is belt-and-braces.
            - name: NEXTAUTH_URL
              value: "https://kalki.bet"
            # PR-TELEGRAM-LOGIN — server-side token for the start route
            # (`/api/auth/telegram/start` reads the numeric prefix as the
            # bot id) AND HMAC verification on the callback. Public bot
            # @username is mirrored as NEXT_PUBLIC_* so it can be read
            # both at build time (inlined into client chunks) and at
            # runtime by lib/telegram.ts on the server.
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kalki-shared
                  key: TELEGRAM_BOT_TOKEN
            - name: NEXT_PUBLIC_TELEGRAM_BOT
              value: {{ .Values.sharedSecret.telegramBotUsername | default "" | quote }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.auctions.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.auctions.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.auctions.resources | nindent 12 }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-auctions
  labels:
    {{- include "kalki.labels" (dict "name" "auctions" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ include "kalki.host" (dict "svc" "auctions" "ctx" .) }}`)
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
  tls:
    certResolver: {{ .Values.traefik.certResolver }}
