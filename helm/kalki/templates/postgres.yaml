{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: kalki-postgres
  labels:
    {{- include "kalki.labels" (dict "name" "postgres" "ctx" .) | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_DB: postgres
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kalki-postgres-initdb
  labels:
    {{- include "kalki.labels" (dict "name" "postgres" "ctx" .) | nindent 4 }}
data:
  10-create-databases.sh: |
    #!/usr/bin/env bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" -d postgres <<-EOSQL
    {{- range .Values.postgres.databases }}
      SELECT 'CREATE DATABASE "{{ . }}"' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='{{ . }}')\gexec
    {{- end }}
    EOSQL
---
apiVersion: v1
kind: Service
metadata:
  name: kalki-postgres
  labels:
    {{- include "kalki.labels" (dict "name" "postgres" "ctx" .) | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: kalki
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kalki-postgres
  labels:
    {{- include "kalki.labels" (dict "name" "postgres" "ctx" .) | nindent 4 }}
spec:
  serviceName: kalki-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: kalki
  template:
    metadata:
      labels:
        {{- include "kalki.labels" (dict "name" "postgres" "ctx" .) | nindent 8 }}
    spec:
      {{- include "kalki.nodeAffinity" . | nindent 6 }}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: kalki-postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready","-U","{{ .Values.postgres.user }}"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready","-U","{{ .Values.postgres.user }}"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: initdb
          configMap:
            name: kalki-postgres-initdb
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.postgres.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end }}
