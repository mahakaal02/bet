{{/*
Routing for the kalki.bet apex domain.

  /             → kalki-auctions, path rewritten to /en/login (hub landing)
  /crash/*      → kalki-aviator,  StripPrefix /crash
  /prediction/* → kalki-bet,      StripPrefix /prediction (legacy)
  /markets/*    → kalki-bet,      pass-through (bet has basePath: '/markets')
  /auction      → kalki-auctions, path rewritten to /en/auctions
  /*  (rest)    → kalki-auctions (pass-through), so /en/profile, /en/wallet,
                  /en/markets, etc. land on the auctions app naturally

NOTE: /en/markets on auctions and /markets (→ bet's markets app) are
intentionally DIFFERENT pages — kalki.bet/markets is the prediction-
markets exchange (bet), kalki.bet/en/markets is the hub's markets
page (auctions). Keep this split when adding new top-level paths.

The /markets rule is pass-through: bet's next.config.ts sets
`basePath: '/markets'`, so the pod natively expects URLs to start
with /markets. Its emitted /_next/static/... URLs are also
basePath-prefixed and hit this same rule, so the page renders
fully styled with client JS.

TLS: cert-manager issues kalki-bet-tls via the letsencrypt-cloudflare
ClusterIssuer (DNS-01, kalki.bet zone solver).

Caveat: /crash and /prediction still hand the routed pod a `/`-rooted
URL via StripPrefix, so aviator's and bet's HTML emit absolute asset
URLs (/_next/…) that escape the prefix and fall through to the catch-
all (auctions) → 404. /markets does NOT suffer this — bet sets
`basePath: '/markets'` so its emitted asset URLs are already
/markets/_next/… and stay on this rule. If /crash or /prediction
need the same treatment, switch them to pass-through and set the
matching basePath on the aviator / bet builds.

Existing kalki-*.cloud.podstack.ai IngressRoutes are untouched.
*/}}
{{- $domain := "kalki.bet" -}}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kalki-bet-tls
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  secretName: kalki-bet-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - {{ $domain }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-strip-crash
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /crash
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-strip-prediction
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /prediction
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-rewrite-auction
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  replacePath:
    path: /en/auctions
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-rewrite-root
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  replacePath:
    path: /en/login
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-bet-domain
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ $domain }}`) && PathPrefix(`/crash`)
      priority: 100
      services:
        - name: kalki-aviator
          port: {{ .Values.aviator.port }}
      middlewares:
        - name: kalki-bet-strip-crash
    - kind: Rule
      match: Host(`{{ $domain }}`) && PathPrefix(`/prediction`)
      priority: 100
      services:
        - name: kalki-bet
          port: {{ .Values.bet.port }}
      middlewares:
        - name: kalki-bet-strip-prediction
    - kind: Rule
      # Pass-through to bet — basePath: '/markets' in bet/next.config.ts
      # means the pod natively serves under this prefix, including its
      # asset URLs (/markets/_next/static/...).
      match: Host(`{{ $domain }}`) && PathPrefix(`/markets`)
      priority: 100
      services:
        - name: kalki-bet
          port: {{ .Values.bet.port }}
    - kind: Rule
      match: Host(`{{ $domain }}`) && Path(`/auction`)
      priority: 100
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
      middlewares:
        - name: kalki-bet-rewrite-auction
    - kind: Rule
      match: Host(`{{ $domain }}`) && Path(`/`)
      priority: 100
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
      middlewares:
        - name: kalki-bet-rewrite-root
    - kind: Rule
      match: Host(`{{ $domain }}`)
      priority: 1
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
  tls:
    secretName: kalki-bet-tls
