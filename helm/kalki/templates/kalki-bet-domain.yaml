{{/*
Routing for the kalki.bet apex domain.

  /          → kalki-auctions, path rewritten to /en/login (hub landing)
  /crash/*   → kalki-aviator, StripPrefix /crash
  /prediction/* → kalki-bet, StripPrefix /prediction
  /auction   → kalki-auctions, path rewritten to /en/auctions
  /*  (rest) → kalki-auctions (pass-through), so /en/profile, /en/wallet,
              /en/markets, etc. land on the auctions app naturally

TLS: cert-manager issues kalki-bet-tls via the letsencrypt-cloudflare
ClusterIssuer (DNS-01, kalki.bet zone solver).

Caveat: /crash and /prediction StripPrefix sends `/` to aviator + bet, but
their absolute asset URLs (/_next/…, /static/…) escape the prefix and fall
through to the catch-all (auctions). Fix at the app level via basePath if
that bites — same caveat as the original path-routing commit.

Existing kalki-*.cloud.podstack.ai IngressRoutes are untouched.
*/}}
{{- $domain := "kalki.bet" -}}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kalki-bet-tls
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  secretName: kalki-bet-tls
  issuerRef:
    name: letsencrypt-cloudflare
    kind: ClusterIssuer
  dnsNames:
    - {{ $domain }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-strip-crash
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /crash
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-strip-prediction
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - /prediction
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-rewrite-auction
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  replacePath:
    path: /en/auctions
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-rewrite-root
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  replacePath:
    path: /en/login
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-bet-domain
  labels:
    {{- include "kalki.labels" (dict "name" "bet-domain" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ $domain }}`) && PathPrefix(`/crash`)
      priority: 100
      services:
        - name: kalki-aviator
          port: {{ .Values.aviator.port }}
      middlewares:
        - name: kalki-bet-strip-crash
    - kind: Rule
      match: Host(`{{ $domain }}`) && PathPrefix(`/prediction`)
      priority: 100
      services:
        - name: kalki-bet
          port: {{ .Values.bet.port }}
      middlewares:
        - name: kalki-bet-strip-prediction
    - kind: Rule
      match: Host(`{{ $domain }}`) && Path(`/auction`)
      priority: 100
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
      middlewares:
        - name: kalki-bet-rewrite-auction
    - kind: Rule
      match: Host(`{{ $domain }}`) && Path(`/`)
      priority: 100
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
      middlewares:
        - name: kalki-bet-rewrite-root
    - kind: Rule
      match: Host(`{{ $domain }}`)
      priority: 1
      services:
        - name: kalki-auctions
          port: {{ .Values.auctions.port }}
  tls:
    secretName: kalki-bet-tls
