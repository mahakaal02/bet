---
apiVersion: v1
kind: Service
metadata:
  name: kalki-bet
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.bet.port }}
      targetPort: {{ .Values.bet.port }}
      name: http
  selector:
    app.kubernetes.io/name: bet
    app.kubernetes.io/part-of: kalki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalki-bet
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  replicas: {{ .Values.bet.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: bet
      app.kubernetes.io/part-of: kalki
  template:
    metadata:
      labels:
        {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 8 }}
        app.kubernetes.io/name: bet
    spec:
      {{- include "kalki.nodeAffinity" . | nindent 6 }}
      {{- if .Values.bet.prismaMigrate }}
      initContainers:
        - name: prisma-migrate
          image: {{ include "kalki.image" (dict "image" .Values.bet.image "tag" .Values.bet.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 0
          command: ["sh","-c","npx prisma migrate deploy --schema=prisma/schema.prisma || npx prisma db push --schema=prisma/schema.prisma --accept-data-loss"]
          env:
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "bet" "override" .Values.bet.databaseUrl "ctx" .) | quote }}
      {{- end }}
      containers:
        - name: bet
          image: {{ include "kalki.image" (dict "image" .Values.bet.image "tag" .Values.bet.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.bet.port }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.bet.port | quote }}
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "bet" "override" .Values.bet.databaseUrl "ctx" .) | quote }}
            - name: NEXTAUTH_URL
              value: "https://{{ include "kalki.host" (dict "svc" "bet" "ctx" .) }}"
            {{- include "kalki.redisEnv" . | nindent 12 }}
            {{- include "kalki.publicUrlEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: kalki-shared
          readinessProbe:
            tcpSocket:
              port: {{ .Values.bet.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.bet.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.bet.resources | nindent 12 }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-bet
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ include "kalki.host" (dict "svc" "bet" "ctx" .) }}`)
      services:
        - name: kalki-bet
          port: {{ .Values.bet.port }}
  tls:
    certResolver: {{ .Values.traefik.certResolver }}
