---
apiVersion: v1
kind: Service
metadata:
  name: kalki-bet
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  ports:
    - port: {{ .Values.bet.port }}
      targetPort: {{ .Values.bet.port }}
      name: http
  selector:
    app.kubernetes.io/name: bet
    app.kubernetes.io/part-of: kalki
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalki-bet
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  replicas: {{ .Values.bet.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: bet
      app.kubernetes.io/part-of: kalki
  template:
    metadata:
      labels:
        {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 8 }}
    spec:
      {{- include "kalki.nodeAffinity" . | nindent 6 }}
      {{- if or .Values.bet.prismaMigrate .Values.bet.prismaSeed }}
      initContainers:
        {{- if .Values.bet.prismaMigrate }}
        - name: prisma-migrate
          image: {{ include "kalki.image" (dict "image" .Values.bet.image "tag" .Values.bet.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 0
          # Pre-cleanup of any genuinely-stuck `_prisma_migrations`
          # row (in-flight + older than 5 minutes), so a previously
          # failed migration with corrected SQL gets a clean retry
          # on the next pod boot. Same self-healing pattern as the
          # backend prisma-migrate init container.
          command:
            - sh
            - -c
            - |
              echo "DELETE FROM _prisma_migrations WHERE finished_at IS NULL AND rolled_back_at IS NULL AND started_at < NOW() - INTERVAL '5 minutes';" \
                | npx prisma db execute --stdin --schema=prisma/schema.prisma 2>/dev/null || true
              npx prisma migrate deploy --schema=prisma/schema.prisma \
                || npx prisma db push --schema=prisma/schema.prisma --accept-data-loss
          env:
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "bet" "override" .Values.bet.databaseUrl "ctx" .) | quote }}
        {{- end }}
        {{- if .Values.bet.prismaSeed }}
        # Idempotent seed — `bet/prisma/seed.ts` is `upsert`-only on
        # stable keys (market.slug, user.email, achievement.code), so
        # re-running on every pod restart adds new markets +
        # achievements without disturbing existing trading volume or
        # price points on already-seeded rows.
        - name: prisma-seed
          image: {{ include "kalki.image" (dict "image" .Values.bet.image "tag" .Values.bet.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 0
          # Invoke tsx directly (the runner already does the same
          # thing under the hood when called via `prisma db seed`).
          # Avoids tying the chart change to whichever image build
          # rolls out first; `tsx` ships in devDependencies which the
          # Dockerfile keeps in `node_modules`.
          command: ["sh","-c","npx --no-install tsx prisma/seed.ts"]
          env:
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "bet" "override" .Values.bet.databaseUrl "ctx" .) | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: bet
          image: {{ include "kalki.image" (dict "image" .Values.bet.image "tag" .Values.bet.imageTag "ctx" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.bet.port }}
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.bet.port | quote }}
            - name: DATABASE_URL
              value: {{ include "kalki.databaseUrl" (dict "dbname" "bet" "override" .Values.bet.databaseUrl "ctx" .) | quote }}
            - name: NEXTAUTH_URL
              value: "https://{{ include "kalki.host" (dict "svc" "bet" "ctx" .) }}"
            # PR-BET-NOWPAYMENTS — crypto top-up integration.
            # NOWPAYMENTS_API_KEY + NOWPAYMENTS_IPN_SECRET ride in via
            # `envFrom: kalki-shared` below (both are secrets). The
            # sandbox flag is a plain env so ops can flip between the
            # sandbox + prod NOWPayments instances by editing helm
            # values without touching the secret.
            - name: NOWPAYMENTS_SANDBOX
              value: {{ .Values.bet.nowpayments.sandbox | default "false" | quote }}
            {{- include "kalki.redisEnv" . | nindent 12 }}
            {{- include "kalki.publicUrlEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: kalki-shared
          readinessProbe:
            tcpSocket:
              port: {{ .Values.bet.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.bet.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.bet.resources | nindent 12 }}
---
# Forward the legacy bet subdomain to the canonical kalki.bet apex.
# The bet app is mounted at basePath '/markets' on the apex
# (bet/next.config.ts), so kalki-bet.cloud.podstack.ai/<path> →
# kalki.bet/markets/<path>. One small smoothing: when the legacy
# path is `/<locale>/markets` (the old markets-list URL — redundant
# now that /markets IS the basePath), strip the trailing `/markets`
# segment so the target is the locale root `/markets/<locale>`. Bet's
# i18n middleware will then redirect that locale root to the actual
# markets list (PR-HUB-TO-MARKETS) in one extra hop. Other paths,
# including deep links like `/en/wallet`, are preserved verbatim.
# 308 keeps caches and bookmarks consistent.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kalki-bet-redirect-to-apex
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  redirectRegex:
    # Alternation: group 1 captures <locale> when the path matches
    # `/<segment>/markets/?` exactly (the redundant case), otherwise
    # group 2 captures the full path. Exactly one of {$1, $2} is
    # non-empty for any given URL, so the replacement concatenates
    # them safely.
    regex: "^https?://[^/]+/(?:([^/]+)/markets/?|(.*))$"
    replacement: "https://kalki.bet/markets/${1}${2}"
    permanent: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kalki-bet
  labels:
    {{- include "kalki.labels" (dict "name" "bet" "ctx" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ include "kalki.host" (dict "svc" "bet" "ctx" .) }}`)
      services:
        - name: kalki-bet
          port: {{ .Values.bet.port }}
      middlewares:
        - name: kalki-bet-redirect-to-apex
  tls:
    certResolver: {{ .Values.traefik.certResolver }}
