---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: kalki
  namespace: flux-system
spec:
  interval: 2m
  sourceRef:
    kind: GitRepository
    name: kalki-gitops
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxbot
        email: fluxbot@kalki.cloud.podstack.ai
      messageTemplate: |
        chore(images): bump tags

        Files:
        {{ range $filename, $_ := .Changed.FileChanges -}}
        - {{ $filename }}
        {{ end }}
        Updates:
        {{ range .Changed.Changes -}}
        - {{ .OldValue }} -> {{ .NewValue }}
        {{ end -}}
    push:
      branch: main
  update:
    path: ./helm/kalki/values.yaml
    strategy: Setters
