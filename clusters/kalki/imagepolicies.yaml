# One ImagePolicy per kalki image. Match the timestamp+sha tag pattern the
# GitHub Actions workflow stamps onto every push: YYYYMMDDTHHMMSSZ-<sha7>.
# Sort lexicographically descending → newest wins.
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: kalki-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: kalki-backend
  filterTags:
    pattern: '^[0-9]{8}T[0-9]{6}Z-[a-f0-9]{7}$'
  policy:
    alphabetical:
      order: asc
---
