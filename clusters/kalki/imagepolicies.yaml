# One ImagePolicy per kalki image. Match the timestamp+sha tag pattern the
# GitHub Actions workflow stamps onto every push: YYYYMMDDTHHMMSSZ-<sha7>.
# Sort lexicographically descending → newest wins.
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: kalki-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: kalki-backend
  filterTags:
    # Match both old GH-Actions tag formats:
    #   - YYYYMMDD-HHMM-<sha7>          (pre-9fae565)
    #   - YYYYMMDDTHHMMSSZ-<sha7>       (post-9fae565)
    pattern: '^[0-9]{8}[T-][0-9]+Z?-[a-f0-9]{7}$'
  policy:
    alphabetical:
      order: asc
---
